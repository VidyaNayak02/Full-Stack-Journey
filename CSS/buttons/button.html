<!DOCTYPE html>
<html>
    <head>
      <style>
        .button1 {
            width:105px;
            height:70px;
            text-align:center;
            color:white;
            font-size:30px;
            padding:20px;
            background-color:red;
            border-radius:15px;
            margin-left:15px;
            margin-right:15px;

        }
        .button1:hover {
            cursor:pointer;
            transform:scale(1.05);
            opacity:0.7;
        }
        .button2 {
              width:105px;
            height:70px;
            text-align:center;
            color:white;
            font-size:30px;
            padding:10px;
            background-color:blue;
            border-radius:15px;
            margin-left:15px;
            margin-right:15px;
          }
          .button2:hover {
            background-color:lightblue;
            color:black;
            cursor:pointer;
          }
          .button3 {
    background-color: orange;
    color: white;
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    box-shadow: 4px 4px 10px gray;
}

.button3:hover {
    transform: translateY(-3px);
    box-shadow: 6px 6px 15px gray;
    cursor: pointer;
}
      </style>
    </head>
    <body>
        <button class="button1" title="Like">Like</button>
        <button class="button2">Share</button>
        <button class="button3">Subscribe</button>
    </body>
 
</html>
