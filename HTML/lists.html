
<div class="list">
    <h1>Ordered List</h1>
    <ol >
        <li>Jairam Prabhu</li>
        <li>Vishva</li>
        <li>Avantika</li>
        <li>Ruchi</li>
        <li>Yash</li>
    </ol>

    <h1>Unordered List</h1>
    <ul>
        <li>Vidya</li>
        <li>Rohit</li>
        <li>Vihan</li>
        <li>Manas</li>
        <li>Shoaib</li>
    </ul>
    <h1>Nested list</h1>
    <ol start="10">
        <li>Parikshit
            <ul>
                <li>Vidya</li>
                <li>Ojas</li>
                <li>Jairam</li>
            </ul>
        </li>
        <li>Divya</li>
        <li>Vihan</li>
    </ol>
</div>
<!Division is used to group the elements together>
<!ol ordered list output is
1.Jairam
2.Vidya
3.Vishva>
<!ul stands for unordered list
Vidya
Rohit
Vihan
Manas
Shoaib with bullet points>
<!you can use start for ordered list if you don't want numbering from 1 you can specify beginning number inside start>
