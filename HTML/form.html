<form>
    <h1>For more information contact</h1>
    <br>
    <br>
    <h1>Name</h1>
    <input type="text" placeholder="Enter your name" required>
    <br>
    <br>
    <h1>Password</h1>
    <input type="password" required>
    <br>
    <br>
    <h1>Email</h1>
    <input type="email" placeholder="Enter your email" required>
    <br>
    <br>
    <h1>Phone Number</h1>
    <input type="tel" placeholder="Enter phone number" maxlength="10">
    <br>
    <br>
    <h1>Date of birth</h1>
    <input type="date">
    <br>
    <br>
    <h1>Gender</h1>
    <input type="radio" name="Gender" value="Male">Male
    <input type="radio" name="Gender" value="Female">Female
    <br>
    <br>
    <h1>Course</h1>
    <input type="checkbox">Java
    <input type="checkbox">Python
    <input type="checkbox">C++
    <br>
    <br>
    <h1>Year</h1>
    <select>
    <option>First Year</option>
    <option>Second Year</option>
    <option>Third Year</option>
    <option>Fourth Year</option>
    </select>
    <br>
    <br>
      <h1>Feedback</h1>
    <textarea rows="5" cols="40" placeholder="Enter your feedback"></textarea>
    <br>
    <br>
    <h1>Upload Photo</h1>
    <input type="file">
    <br>
    <br>
    <h1>Upload 10th,12th Marks Card</h1>
    <input type="file" multiple>
    <br>
    <br>
    <h1>Upload Linkedin Link</h1>
    <input type="url" placeholder="Enter Linkedin Link">
    <br>
    <br>
    <h1>Enter satisfaction range</h1>
    <input type="range" min="1" max="10">
    <br>
    <br>
    <h1>Search</h1>
    <input type="search" placeholder="Search here">
    <h1>Submit</h1>
    <input type="submit" value="Register">
    <br>
    <br>
    <h1>Reset</h1>
    <input type="reset" value="Clear Form">
</form>
<!Place Holder means before  you type the required answer it displays the message written inside placeholder>
<!Required means we should compulsory fill the value inside it>
<!maxlength specifies maximum value that can be stored inside the particular>
<!Date type is not supported by all web browsers especially internet explorer>
<! in text area rows represent hight of textarea and cols represent width>
<!multiple keyword in file is used to upload multiple files>
<!Types used here are 
   text
   email
   password
   tel
   date
   search
   file
   file multiple
   url
   textarea
   submit
   reset
   checkbox
   radio
   select
   range>
