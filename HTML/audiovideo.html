<audio controls>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<video controls width="500">
    <source src="video.mp4" type="video/mp4">
</video>
<!-- <audio> is used to embed audio files such as songs, podcasts, or recordings into a webpage. -->

<!-- <video> is used to embed video files into a webpage, allowing users to watch videos directly on the website. -->

<!-- <source> specifies the location (path) and type of the audio or video file. -->

<!-- controls displays built-in playback controls such as Play, Pause, Volume, and Full Screen (for videos). -->

<!-- autoplay automatically starts playing the media when the webpage loads. -->

<!-- loop continuously repeats the audio or video after it ends. -->

<!-- muted starts the audio or video without sound. -->

<!-- poster specifies an image displayed before the video starts playing. -->

<!-- width and height specify the size of the video player. -->
